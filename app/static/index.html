<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EE 保研罗盘</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="hero">
    <div>
      <span class="eyebrow">EE BAOYAN COMPASS · MVP</span>
      <h1>电子信息与通信工程保研匹配</h1>
      <p>输入背景，获得可解释的冲刺、稳妥、保底项目建议。当前院校画像为演示数据，不代表真实录取难度。</p>
    </div>
  </header>

  <main class="layout">
    <section class="panel form-panel">
      <h2>个人背景</h2>
      <form id="profile-form">
        <div class="grid two">
          <label>本科院校<input name="school_name" value="示例大学" required /></label>
          <label>本科层次
            <select name="school_tier">
              <option value="top985">顶尖 985</option>
              <option value="985">985</option>
              <option value="211" selected>211</option>
              <option value="double_first_class">双一流/强势行业院校</option>
              <option value="ordinary">普通本科</option>
            </select>
          </label>
          <label>专业<input name="major" value="通信工程" required /></label>
          <label>专业排名百分比<input name="rank_percent" type="number" min="0.1" max="100" step="0.1" value="8" required /></label>
          <label>GPA<input name="gpa" type="number" min="0" max="5" step="0.01" value="3.7" required /></label>
          <label>GPA 满分<input name="gpa_scale" type="number" min="1" max="5" step="0.1" value="4" required /></label>
          <label>四级<input name="cet4" type="number" min="0" max="710" value="560" /></label>
          <label>六级<input name="cet6" type="number" min="0" max="710" value="510" /></label>
        </div>

        <div class="grid four sliders">
          <label>科研强度 <output id="research_level_out">3</output><input name="research_level" type="range" min="0" max="5" value="3" /></label>
          <label>竞赛强度 <output id="competition_level_out">3</output><input name="competition_level" type="range" min="0" max="5" value="3" /></label>
          <label>论文成果 <output id="publication_level_out">1</output><input name="publication_level" type="range" min="0" max="5" value="1" /></label>
          <label>项目经历 <output id="project_level_out">3</output><input name="project_level" type="range" min="0" max="5" value="3" /></label>
        </div>

        <div class="grid two">
          <label>研究方向（用逗号分隔）<input name="directions" value="无线通信,信号处理" /></label>
          <label>地区偏好（用逗号分隔）<input name="preferred_regions" value="北京,上海,江苏" /></label>
          <label>培养类型
            <select name="degree_types" multiple size="3">
              <option value="academic_master" selected>学术硕士</option>
              <option value="professional_master" selected>专业硕士</option>
              <option value="direct_phd">直博</option>
            </select>
          </label>
          <label>风险偏好
            <select name="risk_preference">
              <option value="conservative">保守</option>
              <option value="balanced" selected>均衡</option>
              <option value="aggressive">进取</option>
            </select>
          </label>
        </div>

        <button type="submit" id="submit-btn">生成匹配建议</button>
      </form>
    </section>

    <section class="panel result-panel">
      <div class="result-heading">
        <div>
          <h2>推荐结果</h2>
          <p id="summary">填写背景后生成结果。</p>
        </div>
        <span class="demo-tag">演示数据</span>
      </div>
      <div id="notice" class="notice">匹配分用于排序和解释，不是录取概率。</div>
      <div id="results" class="results empty">暂无结果</div>
    </section>
  </main>

  <footer>开源 MVP · 数据可追溯优先 · 不做算命式录取预测</footer>
  <script src="/static/app.js"></script>
</body>
</html>
